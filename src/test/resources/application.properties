spring.application.name=placementportal-test
spring.datasource.url=jdbc:h2:mem:placementportal;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret
n8n.placement-chatbot.webhook-url=${N8N_PLACEMENT_CHATBOT_WEBHOOK_URL:https://iareplacements9866.app.n8n.cloud/webhook/placement-chatbot}
