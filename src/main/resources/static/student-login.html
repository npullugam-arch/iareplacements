<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | IARE AI Placement Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="student-login-page">

    <main class="login-page-wrapper">
        <section class="login-card" id="cardContainer">
            <div class="logo-container">
                <img src="https://i.postimg.cc/prYT6shx/8ee6827a-7cf9-479e-b164-de0643a3b7a0.jpg" alt="IARE Placement Cell Logo">
            </div>

            <form id="studentLoginForm" novalidate>
                <div class="input-group">
                    <label for="studentUsername">User ID</label>
                    <input
                        type="text"
                        id="studentUsername"
                        name="username"
                        placeholder="College Roll Number"
                        required>
                </div>

                <div class="input-group">
                    <label for="studentPassword">Password</label>
                    <input
                        type="password"
                        id="studentPassword"
                        name="password"
                        placeholder="DDMMYYYY"
                        required>
                </div>

                <p id="studentError" class="error-message" aria-live="polite"></p>

                <button type="submit" class="login-btn" id="loginBtn">
                    Authenticate
                </button>
            </form>
        </section>
    </main>

    <script src="/js/auth.js"></script>
</body>
</html>
