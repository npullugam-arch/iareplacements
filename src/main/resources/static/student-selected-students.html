<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selected Students | IARE AI Placement Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/student-selected-students.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="student-selected-students-page" data-portal-role="student">
    <div class="scroll-progress" id="scrollProgress"></div>

    <main class="main" role="main">
        <header class="statistics-page-header">
            <a class="back-btn" id="selectedStudentsBackBtn" href="/student-dashboard">
                <i data-lucide="arrow-left"></i>
                <span>Back</span>
            </a>
            <div class="header-title-block">
                <h1>SELECTED STUDENTS</h1>
            </div>
        </header>

        <section class="notice-section filters-section" aria-label="Student Filters">
            <div class="filters-container">
                <div class="search-wrap">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, roll no, or company...">
                </div>
                <div class="select-wrap">
                    <select id="branchFilter">
                        <option value="">All Branches</option>
                    </select>
                </div>
                <div class="select-wrap">
                    <select id="sectionFilter">
                        <option value="">All Sections</option>
                    </select>
                </div>
                <div class="select-wrap">
                    <select id="companyFilter">
                        <option value="">All Companies</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="cards-section" aria-label="Student Results">
            <div id="studentSelectedStudentsLoading" class="empty-state loading-state">
                <i data-lucide="users-round"></i>
                <h3>Loading selected students...</h3>
                <p>Please wait while we fetch placement records.</p>
            </div>

            <div class="cards-grid" id="studentsGrid"></div>

            <div id="emptyState" class="empty-state hidden">
                <i data-lucide="users-round"></i>
                <h3>No students found</h3>
                <p>Try adjusting your search or filters to find what you're looking for.</p>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="studentModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" type="button" aria-label="Close selected student modal">
                <i data-lucide="x"></i>
            </button>
            <div class="modal-header">
                <div class="modal-img">
                    <img id="modalImg" src="" alt="Student">
                </div>
                <div class="modal-title">
                    <h2 id="modalName">Name</h2>
                    <p id="modalRoll">Roll No</p>
                </div>
            </div>
            <div class="modal-details">
                <div class="detail-row">
                    <span class="detail-label">Company</span>
                    <span class="detail-value" id="modalCompany">N/A</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Branch</span>
                    <span class="detail-value" id="modalBranch">N/A</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Section</span>
                    <span class="detail-value" id="modalSection">N/A</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Package</span>
                    <span class="detail-value" id="modalPackage">N/A</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Selected Date</span>
                    <span class="detail-value" id="modalDate">N/A</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/student-selected-students.js"></script>
</body>
</html>
