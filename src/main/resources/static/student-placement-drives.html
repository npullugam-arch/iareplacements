<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Placement Drives | IARE AI Placement Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/student-placement-drives.css">
    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
</head>
<body class="student-placement-drives-page" data-portal-role="student">
    <div class="scroll-progress" id="scrollProgress"></div>

    <main class="statistics-main">
        <header class="statistics-page-header">
            <a class="back-btn" id="placementDrivesBackBtn" href="/student-dashboard">
                <i data-lucide="arrow-left"></i>
                <span>Back</span>
            </a>
            <div class="header-title-block">
                <h1>PLACEMENT DRIVES</h1>
            </div>
        </header>

        <section class="controls-section">
            <div class="search-bar-container">
                <i data-lucide="search" class="search-icon"></i>
                <input id="driveSearchInput" type="text" placeholder="Search by company name or drive title...">
            </div>

            <div class="filters-row">
                <div class="select-wrap">
                    <select id="driveYearFilter">
                        <option value="">All Hiring Years</option>
                    </select>
                </div>
                <div class="select-wrap">
                    <select id="driveStatusFilter">
                        <option value="">All Statuses</option>
                        <option value="Upcoming">Upcoming</option>
                        <option value="Ongoing">Ongoing</option>
                        <option value="Completed">Completed</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="select-wrap">
                    <select id="driveJobTypeFilter">
                        <option value="">All Job Types</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="results-header">
            <div class="results-count">
                <span id="driveCount">0</span> drives found
            </div>
        </div>

        <section>
            <div id="studentDrivesLoading" class="loading-state">Loading placement drives...</div>
            <div id="studentDriveList" class="cards-grid"></div>
            <div id="studentDriveEmpty" class="empty-state hidden">
                <i data-lucide="briefcase"></i>
                <h3>No drives found</h3>
                <p>Try adjusting your search filters.</p>
            </div>
        </section>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/student-placement-drives.js"></script>
</body>
</html>
