<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile | IARE AI Placement Portal</title>
    <link rel="stylesheet" href="/css/student-profile.css">
</head>
<body class="student-profile-page" data-portal-role="student">
<main class="main">
    <header class="statistics-page-header">
        <a class="back-btn" href="/student-dashboard#student-profile-card">
            <span class="back-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6"></path>
                </svg>
            </span>
            <span>Back</span>
        </a>
        <div class="header-title-block">
            <h1>STUDENT PROFILE</h1>
        </div>
    </header>

    <div id="studentProfileLoading" class="page-state">Loading your profile...</div>
    <div id="studentProfileError" class="page-state hidden"></div>

    <section id="studentProfileContent" class="profile-layout hidden">
        <div class="profile-header">
            <div class="profile-header-content">
                <div class="profile-avatar" id="profileAvatarShell">
                    <img id="studentProfilePhoto" class="profile-avatar-image hidden" alt="Student photo">
                    <span id="studentProfilePhotoFallback" class="profile-avatar-fallback">ST</span>
                </div>
                <div class="profile-info">
                    <h1 class="profile-name font-display" id="studentName">Student Name</h1>
                    <p class="profile-subtitle">Student Profile</p>
                    <div class="profile-tags">
                        <span class="tag tag-primary">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span id="semesterTag">Semester N/A</span>
                        </span>
                        <span class="tag tag-secondary">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path>
                            </svg>
                            <span id="branchTag">N/A</span>
                        </span>
                        <span class="tag tag-secondary">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                            <span id="sectionTag">Section N/A</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <h2 class="section-title font-display">Student Details</h2>
            </div>
            <div class="grid grid-2" id="studentAcademicGrid"></div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                    </svg>
                </div>
                <h2 class="section-title font-display">Contact Information</h2>
            </div>
            <div class="grid grid-3" id="studentFamilyGrid"></div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                </div>
                <h2 class="section-title font-display">Additional Details</h2>
            </div>
            <div class="grid grid-2" id="studentAddressGrid"></div>
        </div>
    </section>
</main>

<script src="/js/auth.js"></script>
<script src="/js/student-profile.js"></script>
</body>
</html>
