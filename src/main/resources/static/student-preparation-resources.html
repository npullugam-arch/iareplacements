<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Preparation Resources | IARE AI Placement Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/student-preparation-resources.css">
    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
</head>
<body class="student-preparation-resources-page" data-portal-role="student">
<div class="scroll-progress" id="scrollProgress"></div>

<main class="main">
    <header class="statistics-page-header">
        <a class="back-btn" id="resourcesBackBtn" href="/student-dashboard">
            <i data-lucide="arrow-left"></i>
            <span>Back</span>
        </a>
        <div class="header-title-block">
            <h1>PREPARATION RESOURCES</h1>
        </div>
    </header>

    <section class="controls-section">
        <div class="search-bar-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search by company name, drive title...">
        </div>

        <div class="filters-row">
            <div class="select-wrap">
                <select id="driveFilter">
                    <option value="">All Placement Drives</option>
                </select>
            </div>
            <div class="select-wrap">
                <select id="yearFilter">
                    <option value="">All Hiring Years</option>
                </select>
            </div>
        </div>
    </section>

    <div class="results-header">
        <div class="results-count">
            <span id="packCount">0</span> preparation packs found
        </div>
    </div>

    <section>
        <div id="studentResourceLoading" class="loading-state">Loading preparation resources...</div>
        <div id="roadmapGrid" class="cards-grid"></div>
        <div id="studentResourceEmpty" class="resource-empty-state hidden">
            No preparation resources are available right now.
        </div>
    </section>
</main>

<div class="modal-overlay" id="packModal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalCompany" aria-describedby="modalDrive">
        <button class="close-modal" id="closeModal" type="button" aria-label="Close preparation resources modal">
            <i data-lucide="x"></i>
        </button>

        <div class="modal-header">
            <div class="modal-company-info">
                <div id="modalLogo" class="company-logo"></div>
                <div class="modal-titles">
                    <h2 id="modalCompany">Company Name</h2>
                    <p id="modalDrive">Drive Name</p>
                </div>
            </div>
            <div class="modal-badge">
                <span class="badge badge-dark">PREPARATION PACK</span>
            </div>
        </div>

        <div class="modal-body">
            <div class="materials-grid">
                <div class="material-card" id="mc-aptitude">
                    <div class="mc-icon"><i data-lucide="calculator"></i></div>
                    <h4>Aptitude Material</h4>
                    <div class="mc-actions"></div>
                </div>

                <div class="material-card" id="mc-coding">
                    <div class="mc-icon"><i data-lucide="code"></i></div>
                    <h4>Coding Material</h4>
                    <div class="mc-actions"></div>
                </div>

                <div class="material-card" id="mc-tech">
                    <div class="mc-icon"><i data-lucide="cpu"></i></div>
                    <h4>Technical Topics</h4>
                    <div class="mc-actions"></div>
                </div>

                <div class="material-card" id="mc-hr">
                    <div class="mc-icon"><i data-lucide="users"></i></div>
                    <h4>HR Preparation</h4>
                    <div class="mc-actions"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/student-preparation-resources.js"></script>
</body>
</html>
